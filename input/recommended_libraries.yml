    - First_to_Second_Aromatic_Ring/2017_Mebel_C6H5_C4H4_highP
    - First_to_Second_Aromatic_Ring/phenyl_diacetylene_effective
    # Aromatics high pressure PES libraries
    - Aromatics_high_pressure/C10H10_1
